<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Jeu orientation</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body { margin:0; height:100%; }
#map { height:100%; }

#topbar {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
}

#topbar button {
  border: none;
  border-radius: 999px;
  background: rgba(255,255,255,0.95);
  padding: 10px 14px;
  font-weight: bold;
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
}

#panel-indices {
  position: absolute;
  top: 70px;
  right: 15px;
  width: 320px;
  max-height: 70vh;
  overflow-y: auto;
  background: white;
  z-index: 1000;
  padding: 16px;
  border-radius: 16px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.3);
}

#panel-indices button {
  margin: 4px 4px 8px 0;
  border: none;
  border-radius: 999px;
  background: #f0f0f0;
  padding: 8px 12px;
  font-weight: bold;
}

#hud {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  display: flex;
  gap: 10px;
}

#hud div {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(5px);
  padding: 10px 14px;
  border-radius: 999px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  font-weight: bold;
}

#joker-info {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  background: white;
  padding: 12px 18px;
  border-radius: 999px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  font-weight: bold;
}
#compass {
  position: absolute;
  bottom: 130px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  width: 70px;
  height: 70px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
}

#compass-arrow {
  font-size: 34px;
  transform-origin: center;
}
.hidden {
  display: none;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="topbar">
  <button id="btn-indices">📜 Indices</button>
</div>

<div id="panel-indices" class="hidden">
  <h3>Descriptions des balises</h3>
  <div id="liste-indices"></div>
  <button onclick="fermerIndices()">Fermer</button>
</div>

<div id="joker-info" class="hidden"></div>
<div id="compass" class="hidden">
  <div id="compass-arrow">⬆️</div>
</div>
<div id="hud">
  <div id="progression"></div>
  <div id="chrono"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ================= CARTE =================
const map = L.map('map').setView([48.822, 2.337], 20);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OpenStreetMap'
}).addTo(map);

// ================= ZONES =================
const zones = [
  {
    id: 0,
    lat: 48.8171,
    lng: 2.3328,
    radius: 10,
    found: false,
    description: "Cherche le grand point d’eau au centre du parc.",
    info: "Le lac du parc Montsouris est l’un des grands repères du parc. Il attire de nombreux oiseaux et sert de point central d’orientation.",
    password: "victor"
  },
  {
    id: 1,
    lat: 48.8209,
    lng: 2.33714,
    radius: 10,
    found: false,
    description: "Je suis percée d’un œil vers le ciel, vestige d’un Paris scientifique. Vous me trouverez près d'un sentier qui vous évoque le nord de l'Afrique.",
    info: "Cette mire était utilisée au XIXe siècle pour aligner les télescopes de l’Observatoire de Paris avec le méridien de Paris. Elle fait partie des rares vestiges du système de mesure pré-Greenwich."
  },
  {
    id: 2,
    lat: 48.82407,
    lng: 2.33645,
    radius: 10,
    found: false,
    description: "Depuis la Colonne de la Paix Armée vous pouvez me voir. Vous pourrez débloquer la balise en vous approchant assez pour indiquer l'heure.",
    info: "La Colonnne de la Paix armée est une statue allégorique, déplacée ici depuis l’Esplanade des Invalides, symbolisant la force tranquille. Elle date du Second Empire."
  },
  {
    id: 3,
    lat: 48.821941,
    lng: 2.336215,
    radius: 10,
    found: false,
    description: "Si vous remontez l'allée du Puits vous me verrez abandonnée. Depuis ma position faites quelques pas au sud, jusqu'à trouver un séquoia singulier",
    info: ""
  },
  {
    id: 4,
    lat: 48.824110,
    lng: 2.33827,
    radius: 10,
    found: false,
    description: "Non loin de moi vous trouverez un fauve dans ces derniers instants. Pour ma part, je suis aux pieds d'une jeune fille courtisée. Quel animal suis-je?",
    info: "Cette statue met en scène un faune, créature mythologique romaine séduisant une jeune fille délicate évoquant l’émotion à la fois physique et psychologique du frisson. Elle date du début XXe siècle.",
    password: "mouton"
  },
  {
    id: 5,
    lat: 48.8225,
    lng: 2.338830,
    radius: 10,
    found: false,
    description: "Trouvez les deux soeurs de pierre qui prennent le soleil",
    info: "Une œuvre décorative typique des jardins publics du XIXe siècle, inspirée par les nymphes et la mythologie."
  },
  {
    id: 6,
    lat: 48.822215,
    lng: 2.33957,
    radius: 10,
    found: false,
    description: "Si vous aimez danser vous nous trouverez plus haut perchés.",
    info: "La Statue Les Naufragés, réalisée en marbre en 1859, est une sculpture située dans le Parc Montsouris. Créée par Antoine Étex, elle représente un groupe de naufragés dans une scène dramatique."
  },
  {
    id: 7,
    lat: 48.82219,
    lng: 2.33707,
    radius: 8,
    found: false,
    description: "Je suis davantage connue pour ma contine pour enfants mais ici vous me trouvez pour vous rassasier. A quelques pas à l'ouest se trouve la sculpture que vous cherchez.",
    info: "Le Drame du Désert est une représentation de 1891 par Georges Gardet sculptée d’un combat entre une lionne et un serpent."
  },
  {
    id: 8,
    lat: 48.82096,
    lng: 2.33828,
    radius: 10,
    found: false,
    description: "Trouvez la statue ci-dessous et complètez la phrase: Les ......... de France de france à la ville de Paris pour son Bimillennaire",
    info: "Figure féminine idéalisée, symbole d’innocence et d’esthétique classique dans un contexte romantique.",
    password: "hellenes"
  },
  {
    id: 9,
    lat: 48.82063,
    lng: 2.34071,
    radius: 10,
    found: false,
    description: "Si vous remontez l'allée du Lac depuis l'entrée sud-est vous me trouverez rapidement sur votre gauche portant mon camarade blessé.",
    info: "Avant d'être un parc, la plaine Montsouris était occupée par les carrières de Montrouge. Ce passé laissa des traces, et les concepteurs durent composer avec un sous-sol complexe."
  },
  {
    id: 10,
    lat: 48.82069,
    lng: 2.33818,
    radius: 10,
    found: false,
    description: "En quelle année est mort le général San Martin. Trouvez le sur son cheval et vous trouverez la réponse",
    info: "Libérateur de l’Argentine, San Martín est célébré ici par la diaspora argentine de Paris, en hommage à sa lutte pour l’indépendance.",
    password: "1850"
  },
  {
    id: 11,
    lat: 48.82023,
    lng: 2.33993,
    radius: 20,
    found: false,
    description: "Je fus un des principaux artisans de la révolution américaine et on m'a d'ailleurs placé près de là où se joue un sport américain. Trouvez moi et indiquez mon année de naissance",
    info: "Thomas Paine fut l’un des penseurs majeurs des révolutions américaine et française. Il incarne l’idée d’un monde régi par la raison.",
    password: "1737"
  },
  {
    id: 12,
    lat: 48.82135,
    lng: 2.33673,
    radius: 10,
    found: false,
    description: "Ma tête est dans les nuages, mes yeux mesurent le vent. Viens me trouver au sommet, là où la science regarde le ciel.",
    info: "Fondé en 1878, cet observatoire analyse la météo parisienne depuis plus d’un siècle."
  },
  {
    id: 13,
    lat: 48.821820,
    lng: 2.340625,
    radius: 10,
    found: false,
    description: "Je gis là au nord-ouest de celle que l'on serre au pantalon.",
    info: "La Petite Ceinture passe par le parc Montsouris. Fermée au service régulier des voyageurs depuis 1934, elle marque encore le paysage du parc."
  },
  {
    id: 14,
    lat: 48.821957,
    lng: 2.3379,
    radius: 10,
    found: false,
    description: "Je suis l'homonyme de Brigitte et si vous prenez mon allée, vous trouverez celui que vous cherchez les branches couchées.",
    info: ""
  },
  {
    id: 15,
    lat: 48.822975,
    lng: 2.337413,
    radius: 10,
    found: false,
    description: "Je me situe au nord du monument en hommage à Flatters. Je fais 25m de haut et 335cm de circonférence.",
    info: ""
  }
];

// ================= VARIABLES =================
const btnIndices = document.getElementById("btn-indices");
const panelIndices = document.getElementById("panel-indices");
const listeIndices = document.getElementById("liste-indices");

let startTime = Date.now();
let player = null;
let accuracyCircle = null;
let lastPlayerPosition = null;
let heading = 0;
let boussoleActive = false;
let lassoActive = false;
let cibleBoussole = null;
let cibleLasso = null;

// ================= SAUVEGARDE =================
function sauvegarderProgression() {
  const data = {
    zones: zones.map(zone => ({
      id: zone.id,
      found: zone.found
    })),
    startTime: startTime
  };

  localStorage.setItem("progressionJeu", JSON.stringify(data));
}

function chargerProgression() {
  const saved = localStorage.getItem("progressionJeu");
  if (!saved) return;

  const data = JSON.parse(saved);

  if (data.startTime) {
    startTime = data.startTime;
  }

  data.zones.forEach(savedZone => {
    const zone = zones.find(z => z.id === savedZone.id);
    if (zone) zone.found = savedZone.found;
  });
}

// ================= INTERFACE =================
function updateProgression() {
  const total = zones.length;
  const found = zones.filter(zone => zone.found).length;
  document.getElementById("progression").innerHTML = `Progression : ${found}/${total}`;
}

function updateChrono() {
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const minutes = Math.floor(elapsed / 60);
  const seconds = elapsed % 60;

  document.getElementById("chrono").innerHTML =
    `Temps : ${minutes}:${seconds.toString().padStart(2, "0")}`;
}

function afficherIndices() {
  if (!panelIndices.classList.contains("hidden")) {
    panelIndices.classList.add("hidden");
    return;
  }

  listeIndices.innerHTML = "";

  zones.forEach(zone => {
    const item = document.createElement("div");

    if (zone.found) {
      item.innerHTML = `
        <strong>Balise ${zone.id} ✅</strong>
        <p>${zone.info || "Aucune information disponible."}</p>
        <hr>
      `;
    } else {
      item.innerHTML = `
        <strong>Balise ${zone.id} 🔒</strong>
        <p>${zone.description}</p>
        <button onclick="activerBoussole(${zone.id})">🧭 Boussole</button>
        <button onclick="activerLasso(${zone.id})">🪢 Lasso</button>
        <hr>
      `;
    }

    listeIndices.appendChild(item);
  });

  panelIndices.classList.remove("hidden");
}

function fermerIndices() {
  panelIndices.classList.add("hidden");
}

// ================= JOKERS =================
function calculerDirection(lat1, lng1, lat2, lng2) {
  const dLng = (lng2 - lng1) * Math.PI / 180;
  lat1 = lat1 * Math.PI / 180;
  lat2 = lat2 * Math.PI / 180;

  const y = Math.sin(dLng) * Math.cos(lat2);
  const x = Math.cos(lat1) * Math.sin(lat2) -
            Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);

  const angle = Math.atan2(y, x) * 180 / Math.PI;
  return (angle + 360) % 360;
}

function directionTexte(angle) {
  if (angle >= 337.5 || angle < 22.5) return "Nord";
  if (angle < 67.5) return "Nord-Est";
  if (angle < 112.5) return "Est";
  if (angle < 157.5) return "Sud-Est";
  if (angle < 202.5) return "Sud";
  if (angle < 247.5) return "Sud-Ouest";
  if (angle < 292.5) return "Ouest";
  return "Nord-Ouest";
}

function activerBoussole(zoneId) {
  cibleBoussole = zones.find(z => z.id === zoneId && !z.found);
  if (!cibleBoussole) return;

  boussoleActive = true;
  startCompass();
  panelIndices.classList.add("hidden");
  updateJokers();
}

function activerLasso(zoneId) {
  cibleLasso = zones.find(z => z.id === zoneId && !z.found);
  if (!cibleLasso) return;

  lassoActive = true;
  panelIndices.classList.add("hidden");
  updateJokers();
}

function updateJokers() {
  const info = document.getElementById("joker-info");

  if (!lastPlayerPosition) {
    info.innerHTML = "Localisation en attente...";
    info.classList.remove("hidden");
    return;
  }

  let texte = "";

  if (boussoleActive && cibleBoussole && !cibleBoussole.found) {
    const angle = calculerDirection(
      lastPlayerPosition.lat,
      lastPlayerPosition.lng,
      cibleBoussole.lat,
      cibleBoussole.lng
    );

    const rotation = angle - heading;

document.getElementById("compass").classList.remove("hidden");
document.getElementById("compass-arrow").style.transform =
  `rotate(${rotation}deg)`;

texte += `🧭 Balise ${cibleBoussole.id}`;
  }

  if (lassoActive && cibleLasso && !cibleLasso.found) {
    const distance = Math.round(
      map.distance(
        [lastPlayerPosition.lat, lastPlayerPosition.lng],
        [cibleLasso.lat, cibleLasso.lng]
      )
    );

    texte += `🪢 Balise ${cibleLasso.id} : ${distance} m`;
  }

  if (!texte) {
    info.classList.add("hidden");
    return;
  }

  info.innerHTML = texte;
  info.classList.remove("hidden");
}
  
function startCompass() {
  window.addEventListener("deviceorientation", function(event) {
    if (event.webkitCompassHeading) {
      heading = event.webkitCompassHeading;
    } else if (event.alpha !== null) {
      heading = 360 - event.alpha;
    }

    updateJokers();
  });
}
// ================= BALISES =================
function afficherBaliseVerrouillee(zone) {
  const marker = L.marker([zone.lat, zone.lng]).addTo(map);

  marker.bindPopup(`
    <strong>Balise ${zone.id}</strong><br><br>
    ${zone.description}<br><br>
    <button onclick="essayerCode(${zone.id})">Entrer le code</button>
  `);

  zone.marker = marker;
}

function essayerCode(zoneId) {
  const zone = zones.find(z => z.id === zoneId);

  if (!zone || zone.found) return;

  const code = prompt("🔐 Entre le code de la Balise " + zone.id);

  if (!code) return;

  if (code.trim().toLowerCase() === zone.password.toLowerCase()) {
    validerBalise(zone);
  } else {
    alert("❌ Code incorrect. Tu peux réessayer plus tard.");
  }
}

function validerBalise(zone) {
  zone.found = true;

  sauvegarderProgression();
  updateProgression();
  updateJokers();

  alert("🎯 Balise découverte : Balise " + zone.id);

  if (zone.marker) {
    zone.marker.setPopupContent(`
      <strong>Balise ${zone.id}</strong><br><br>
      ${zone.info || "Aucune information disponible."}
    `);
    zone.marker.openPopup();
  } else {
    const discoveredMarker = L.marker([zone.lat, zone.lng]).addTo(map);

    discoveredMarker.bindPopup(`
      <strong>Balise ${zone.id}</strong><br><br>
      ${zone.info || "Aucune information disponible."}
    `);

    discoveredMarker.openPopup();
  }

  L.circle([zone.lat, zone.lng], {
    radius: zone.radius,
    color: "green",
    fillOpacity: 0.2
  }).addTo(map);

  if (navigator.vibrate) navigator.vibrate(200);
}

function afficherBalisesDejaTrouvees() {
  zones.forEach(zone => {
    if (zone.found) {
      const marker = L.marker([zone.lat, zone.lng]).addTo(map);

      marker.bindPopup(`
        <strong>Balise ${zone.id}</strong><br><br>
        ${zone.info || "Aucune information disponible."}
      `);

      L.circle([zone.lat, zone.lng], {
        radius: zone.radius,
        color: "green",
        fillOpacity: 0.2
      }).addTo(map);
    }
  });
}

function checkZones(lat, lng) {
  zones.forEach(zone => {
    if (zone.found) return;

    const dist = map.distance([lat, lng], [zone.lat, zone.lng]);

    if (dist < zone.radius) {
      if (zone.password) {
        if (!zone.marker) {
          afficherBaliseVerrouillee(zone);
          zone.marker.openPopup();
        }
        return;
      }

      validerBalise(zone);
    }
  });
}

// ================= JOUEUR =================
const playerIcon = L.icon({
  iconUrl: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="10" fill="#007bff" stroke="white" stroke-width="4"/>
      <circle cx="20" cy="20" r="18" fill="none" stroke="#007bff" stroke-opacity="0.3" stroke-width="4"/>
    </svg>
  `),
  iconSize: [40, 40],
  iconAnchor: [20, 20]
});

function success(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const accuracy = pos.coords.accuracy;

  const position = [lat, lng];
  lastPlayerPosition = { lat, lng };

  if (!player) {
    player = L.marker(position, {
      icon: playerIcon,
      zIndexOffset: 1000
    }).addTo(map);

    accuracyCircle = L.circle(position, {
      radius: accuracy,
      color: "blue",
      fillOpacity: 0.1
    }).addTo(map);

    map.setView(position, 18);
  } else {
    player.setLatLng(position);
    accuracyCircle.setLatLng(position);
    accuracyCircle.setRadius(accuracy);
  }

  updateJokers();
  checkZones(lat, lng);
}

function error(err) {
  console.error(err);
  alert("Erreur GPS : " + err.message);
}

// ================= INIT =================
chargerProgression();
afficherBalisesDejaTrouvees();
updateProgression();
updateChrono();

setInterval(updateChrono, 1000);
setInterval(sauvegarderProgression, 5000);

btnIndices.addEventListener("click", afficherIndices);

if ("geolocation" in navigator) {
  navigator.geolocation.watchPosition(success, error, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 15000
  });
} else {
  alert("GPS non supporté");
}
</script>

</body>
</html>
