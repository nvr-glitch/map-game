<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Jeu orientation</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body { margin:0; height:100%; }
#map { height:100%; }

#btn-indices {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 1000;
  padding: 10px 14px;
}

#panel-indices {
  position: absolute;
  top: 60px;
  right: 10px;
  width: 300px;
  max-height: 70vh;
  overflow-y: auto;
  background: white;
  z-index: 1000;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div id="map"></div>
<button id="btn-indices">📜 Indices</button>
<div id="panel-indices" class="hidden">
  <h3>Descriptions des balises</h3>
  <div id="liste-indices"></div>
  <button onclick="fermerIndices()">Fermer</button>
</div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ================= CARTE =================
const map = L.map('map').setView([48.822, 2.337], 20);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: 'OpenStreetMap'
}).addTo(map);

// ================= ZONES =================
const zones = [
  {
    id: 1,
    name: "Balise 1",
    lat: 48.817154,
    lng: 2.332798,
    radius: 10,
    found: false,
    description: "Cherche le grand point d’eau au centre du parc."
    info: "Le lac du parc Montsouris est l’un des grands repères du parc. Il attire de nombreux oiseaux et sert de point central d’orientation."
  },
  {
    id: 2,
    name: "Balise 2",
    lat: 48.8232,
    lng: 2.3379,
    radius: 30,
    found: false,
    description: "Monte légèrement au-dessus du lac et cherche une sculpture visible depuis la pelouse."
    info: "info test"
  }
];

const btnIndices = document.getElementById("btn-indices");
const panelIndices = document.getElementById("panel-indices");
const listeIndices = document.getElementById("liste-indices");

function afficherIndices() {
  listeIndices.innerHTML = "";

  zones.forEach(zone => {
    const item = document.createElement("div");
    item.innerHTML = `
      <p><strong>${zone.name}</strong></p>
      <p>${zone.description}</p>
      <hr>
    `;
    listeIndices.appendChild(item);
  });

  panelIndices.classList.remove("hidden");
}

function fermerIndices() {
  panelIndices.classList.add("hidden");
}

btnIndices.addEventListener("click", afficherIndices);
  
// (debug visuel - tu peux enlever après)
zones.forEach(z => {
L.circle([z.lat, z.lng], {
radius: z.radius,
color: 'red',
fillOpacity: 0.1
}).addTo(map);
});

// ================= JOUEUR =================

// Icône joueur (point bleu type Google Maps)
const playerIcon = L.icon({
  iconUrl: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="10" fill="#007bff" stroke="white" stroke-width="4"/>
      <circle cx="20" cy="20" r="18" fill="none" stroke="#007bff" stroke-opacity="0.3" stroke-width="4"/>
    </svg>
  `),
  iconSize: [40, 40],
  iconAnchor: [20, 20]
});

let player = null;
let accuracyCircle = null;

// succès GPS
function success(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const accuracy = pos.coords.accuracy;

  console.log("GPS :", lat, lng);

  const position = [lat, lng];

  // création du joueur
  if (!player) {
    player = L.marker(position, {
      icon: playerIcon,
      zIndexOffset: 1000
    }).addTo(map);

    // cercle de précision GPS
    accuracyCircle = L.circle(position, {
      radius: accuracy,
      color: "blue",
      fillOpacity: 0.1
    }).addTo(map);

    map.setView(position, 18);
  } 
  // mise à jour position
  else {
    player.setLatLng(position);
    accuracyCircle.setLatLng(position);
    accuracyCircle.setRadius(accuracy);
  }

  // validation zones
  checkZones(lat, lng);
}

// erreur GPS
function error(err) {
  console.error(err);
  alert("Erreur GPS : " + err.message);
}

// démarrage GPS
if ("geolocation" in navigator) {
  navigator.geolocation.watchPosition(success, error, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 15000
  });
} else {
  alert("GPS non supporté");
}
// ================= VALIDATION =================
function checkZones(lat, lng) {
zones.forEach(zone => {

if (zone.found) return;

const dist = map.distance([lat, lng], [zone.lat, zone.lng]);

if (dist < zone.radius) {
  zone.found = true;

  alert("🎯 Balise découverte : " + zone.name);

  const discoveredMarker = L.marker([zone.lat, zone.lng]).addTo(map);

  discoveredMarker.bindPopup(`
    <strong>${zone.name}</strong><br><br>
    ${zone.info || "Aucune information disponible."}
  `);

  discoveredMarker.openPopup();

  if (navigator.vibrate) navigator.vibrate(200);
}

// zone devient verte
L.circle([zone.lat, zone.lng], {
radius: zone.radius,
color: 'green',
fillOpacity: 0.2
}).addTo(map);

// vibration (mobile)
if (navigator.vibrate) navigator.vibrate(200);
}
});
}
</script>

</body>
</html>
