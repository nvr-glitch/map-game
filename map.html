<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Jeu orientation</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body { margin:0; height:100%; }
#map { height:100%; }

#btn-indices {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 1000;
  padding: 10px 14px;
}

#panel-indices {
  position: absolute;
  top: 60px;
  right: 10px;
  width: 300px;
  max-height: 70vh;
  overflow-y: auto;
  background: white;
  z-index: 1000;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div id="map"></div>
<button id="btn-indices">📜 Indices</button>
<div id="panel-indices" class="hidden">
  <h3>Descriptions des balises</h3>
  <div id="liste-indices"></div>
  <button onclick="fermerIndices()">Fermer</button>
</div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([48.822, 2.337], 20);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: 'OpenStreetMap'

// ================= ZONES =================

  },
    {
      // Stele abandonnée / Séquoia
     id: 3,
    lat: 48.1941,
    lng: 2.336215,
    radius: 10,
    found: false,
    description: "Si vous remontez l'allée du Puits vous me verrez abandonnée. Depuis ma position faites quelques pas au sud, jusqu'à trouver un séquoia singulier",
    info: ""
  },
    {  
      // Premier Frisson
  id: 4,
    lat: 48.824110,
    lng: 2.338231,
    radius: 10,
    found: false,
    description: "Non loin de moi vous trouverez un fauve dans ces derniers instants. Pour ma part, je suis aux pieds d'une jeune fille courtisée. Quel animal suis-je?",
    info: "Cette statue met en scène un faune, créature mythologique romaine séduisant une jeune fille délicate évoquant l’émotion à la fois physique et psychologique du frisson. Elle date du début XXe siècle.",
  password: "mouton"
  },
    {
  id: 5,
    lat: 48.8225,
    lng: 2.339507,

    found: false,
    description: "Trouvez les deux soeurs de pierre qui prennent le soleil",
    info: "Une œuvre décorative typique des jardins publics du XIXe siècle, inspirée par les nymphes et la mythologie."
       },
 {
  id: 6,
    lat: 48.82215,
    lng: 2.339507,
    radius: 10,
    found: false,
    description: "Si vous aimez danser vous nous trouverez plus haut perchés.",
    info: "La Statue Les Naufragés, réalisée en marbre en 1859, est une sculpture captivante située dans le Parc Montsouris, dans le XIVe arrondissement de Paris. Créée par Antoine Étex, cette œuvre représente un groupe de naufragés, figés dans une scène dramatique et émouvante. Les détails minutieux de la sculpture, tels que les expressions de terreur et de désespoir sur les visages des naufragés, captivent l'attention des visiteurs et les transportent dans un monde de tragédie et de survie.",
 
    },
  {

    info: "La Drale du Désert est une représentation de 1891 par Georges Gardet sculptée d’un combat une lionne et un serpent, typique de la fascination coloniale pour l’Afrique à l’époque."
    },
   {
  id: 8,
    lat: 48.82096,
    lng: 2.33828,
    radius: 10,
    found: false,
    description: "Trouvez la statue ci-dessous et complètez la phrase: Les ......... de France de france à la ville de Paris pour son Bimillennaire",
    info: "Figure féminine idéalisée, symbole d’innocence et d’esthétique classique dans un contexte romantique.",
  password: "hellenes"
    },
  {
  id: 9,
    lat: 48.820770,

  password: "1850"

   {
  id: 11,

    },
  {
  id: 13,
    lat: 48.82135,
    lng: 2.33673,
    radius: 10,
    found: false,
    description: "Je gis là au nord-ouest de celle que l'on serre au pantalon.",
    info: "La ligne de Petite Ceinture, voie de chemin de fer, fermée au service régulier des trains de voyageurs depuis 1934, passe par le parc Montsouris. C'est d'abord une tranchée de 150 mètres qui sort du tunnel passant sous la rue Gazan. Puis la voie emprunte un tunnel d'un kilomètre est-ouest qui passe sous le parc."
    },
    {
       id: 14,
    lat: 48.821957,
    lng: 2.3379,
    radius: 10,
    found: false,
    description: "Je suis l'homonyme de Brigitte et si vous prenez mon allée, vous trouverez celui que vous cherchez les branches couchées.",
    info: ""
    },
    {
      id: 15,
    lat: 48.822975,
    lng: 2.337413,
    radius: 10,
    found: false,
    description: "Je me situe au nord du monument en hommage à Flatters. Je fais 25m de haut et 335cm de circonférence.",
    info: ""
    },
];

const btnIndices = document.getElementById("btn-indices");
const panelIndices = document.getElementById("panel-indices");
const listeIndices = document.getElementById("liste-indices");

function afficherIndices() {
  listeIndices.innerHTML = "";

  zones.forEach(zone => {
    const item = document.createElement("div");
    item.innerHTML = `
     <strong>Balise ${zone.id}</strong>
      <p>${zone.description}</p>
      <hr>
    `;
    listeIndices.appendChild(item);
  });

  panelIndices.classList.remove("hidden");
}

function fermerIndices() {
  panelIndices.classList.add("hidden");
}

btnIndices.addEventListener("click", afficherIndices);
  
// (debug visuel - tu peux enlever après)
zones.forEach(z => {
L.circle([z.lat, z.lng], {
radius: z.radius,
color: 'red',
fillOpacity: 0.1
}).addTo(map);
});

// ================= JOUEUR =================

// Icône joueur (point bleu type Google Maps)
const playerIcon = L.icon({
  iconUrl: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="10" fill="#007bff" stroke="white" stroke-width="4"/>
      <circle cx="20" cy="20" r="18" fill="none" stroke="#007bff" stroke-opacity="0.3" stroke-width="4"/>
    </svg>
  `),
  iconSize: [40, 40],
  iconAnchor: [20, 20]
});

let player = null;
let accuracyCircle = null;

// succès GPS
function success(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const accuracy = pos.coords.accuracy;

  console.log("GPS :", lat, lng);

  const position = [lat, lng];

  // création du joueur
  if (!player) {
    player = L.marker(position, {
      icon: playerIcon,
      zIndexOffset: 1000
    }).addTo(map);

    // cercle de précision GPS
    accuracyCircle = L.circle(position, {
      radius: accuracy,
      color: "blue",
      fillOpacity: 0.1
    }).addTo(map);

    map.setView(position, 18);
  } 
  // mise à jour position
  else {
    player.setLatLng(position);
    accuracyCircle.setLatLng(position);
    accuracyCircle.setRadius(accuracy);
  }

  // validation zones
  checkZones(lat, lng);
}

// erreur GPS
function error(err) {
  console.error(err);
  alert("Erreur GPS : " + err.message);
}

// démarrage GPS
if ("geolocation" in navigator) {
  navigator.geolocation.watchPosition(success, error, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 15000
  });
} else {
  alert("GPS non supporté");
}
// ================= VALIDATION =================

function checkZones(lat, lng) {
  zones.forEach(zone => {

    if (zone.found) return;

    const dist = map.distance([lat, lng], [zone.lat, zone.lng]);

    if (dist < zone.radius) {

      if (zone.password) {
        const code = prompt("🔐 Cette balise est verrouillée. Entre le code :");

        if (!code || code.trim().toLowerCase() !== zone.password.toLowerCase()) {
          alert("❌ Code incorrect.");
          return;
        }
      }

      zone.found = true;

     alert("🎯 Balise découverte : Balise " + zone.id);

      const discoveredMarker = L.marker([zone.lat, zone.lng]).addTo(map);

      discoveredMarker.bindPopup(`
  <strong>Balise ${zone.id}</strong><br><br>
  ${zone.info || "Aucune information disponible."}
`);

      discoveredMarker.openPopup();

      L.circle([zone.lat, zone.lng], {
        radius: zone.radius,
        color: "green",
        fillOpacity: 0.2
      }).addTo(map);

      if (navigator.vibrate) navigator.vibrate(200);
    }
  });
}

</script>

</body>
</html>
